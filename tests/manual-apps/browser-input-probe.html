<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>UniLume Browser Probe</title>
  <style>
    body {
      font: 18px sans-serif;
      margin: 2rem;
    }

    textarea {
      box-sizing: border-box;
      height: 50vh;
      width: 100%;
    }

    [contenteditable] {
      border: 1px solid;
      min-height: 8rem;
      padding: 0.5rem;
    }
  </style>
</head>
<body>
  <label for="probe">UniLume controlled input probe</label>
  <textarea id="probe" autofocus></textarea>
  <p>Contenteditable probe</p>
  <div id="editable" contenteditable="true"></div>
  <script>
    const probe = document.querySelector("#probe");
    const editable = document.querySelector("#editable");
    const report = (kind, value) => {
      document.title = `${kind}:${value.replaceAll("\n", "|")}`;
    };
    probe.addEventListener("input", () => report("RESULT", probe.value));
    editable.addEventListener(
      "input",
      () => report("EDITABLE", editable.innerText));
  </script>
</body>
</html>
