# SPDX-License-Identifier: GPL-2.0-or-later

name: Integration Smoke

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  integration-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Fcitx5 development files
        run: |
          sudo apt-get update
          sudo apt-get install --yes libfcitx5core-dev pkg-config

      - name: Configure integration sanitizer build
        run: |
          cmake \
            -S . \
            -B build/integration-smoke \
            -DCMAKE_BUILD_TYPE=Debug \
            -DUNILUME_ENABLE_ASAN=ON \
            -DUNILUME_ENABLE_UBSAN=ON \
            -DUNILUME_BUILD_INTEGRATION_BENCHMARKS=ON \
            -DUNILUME_BUILD_FCITX5_ADDON=ON

      - name: Build core, harness, benchmark, and addon
        run: |
          cmake \
            --build build/integration-smoke \
            --parallel 2

      - name: Run deterministic integration tests
        env:
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        run: |
          ctest \
            --test-dir build/integration-smoke \
            --output-on-failure

      - name: Validate machine-readable integration smoke
        env:
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        run: |
          build/integration-smoke/benchmarks/unilume_integration_benchmark \
            --smoke \
            --format=json \
            --output=build/integration-smoke/integration-smoke.json
          test -s build/integration-smoke/integration-smoke.json
